name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  unit:
    # Tests unitaires + gate de couverture 100% (statements ET branches),
    # matrice Python 3.9–3.12. WeeWX n'est publié sur PyPI qu'à partir de la 5.0
    # (la 4.x n'y est pas) ; on teste donc contre WeeWX 5. La compat WeeWX 4 tient
    # aux API stables utilisées (StdService, ExtensionInstaller, weewx.units).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest pytest-cov meshtastic weewx qrcode
      - run: pytest   # addopts (pyproject) impose --cov-branch --cov-fail-under=100

  integration:
    # Protocole réel contre un node Meshtastic SIMULÉ (meshtasticd -s), sans matériel.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Intégration vs node simulé
        run: >
          docker compose -f test/docker-compose.test.yml up --build
          --abort-on-container-exit --exit-code-from tester
